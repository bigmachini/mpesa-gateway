info:
  name: Reverse an M-Pesa Transaction
  type: http
  seq: 2

http:
  method: POST
  url: https://sandbox.safaricom.co.ke/mpesa/reversal/v1/request
  headers:
    - name: Authorization
      value: Bearer <Access-Token>
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: "{\r

      \    \"Initiator\": \"\",\r

      \    \"SecurityCredential\": \"\",\r

      \    \"CommandID\": \"TransactionReversal\",\r

      \    \"TransactionID\": \"\",\r

      \    \"Amount\": \"\",\r

      \    \"ReceiverParty\": \"\",\r

      \    \"RecieverIdentifierType\": \"4\",\r

      \    \"ResultURL\": \"\",\r

      \    \"QueueTimeOutURL\": \"\",\r

      \    \"Remarks\": \"\",\r

      \    \"Occasion\": \"\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
