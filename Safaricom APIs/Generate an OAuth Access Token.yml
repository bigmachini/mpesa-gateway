info:
  name: Generate an OAuth Access Token
  type: http
  seq: 9

http:
  method: GET
  url: https://sandbox.safaricom.co.ke/oauth/v1/generate?grant_type=client_credentials
  params:
    - name: grant_type
      value: client_credentials
      type: query
  body:
    type: multipart-form
  auth:
    type: basic
    username: ""
    password: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
